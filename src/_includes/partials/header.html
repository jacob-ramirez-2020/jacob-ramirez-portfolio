<header class="bg-muted text-white shadow-md fixed w-full top-0 z-50">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
    <a href="/" class="text-xl font-bold text-primary hover:text-accent transition">NextGenScadaProgrammer</a>
    <nav class="hidden md:flex space-x-6" id="nav-links">
      <a href="/" data-link="home" class="hover:text-accent transition">Home</a>
      <a href="/blogs/" data-link="blog" class="hover:text-accent transition">Blog</a>
      <a href="/aboutme/" data-link="blog" class="hover:text-accent transition">About Me</a>
      <a href="#contact" class="hover:text-accent transition">Contact</a>
    </nav>
  </div>
</header>

<script>
  // Highlight the active nav link automatically
  const path = window.location.pathname;
  const navLinks = document.querySelectorAll("#nav-links a");

  navLinks.forEach(link => {
    if (path === "/" && link.getAttribute("data-link") === "home") {
      link.classList.add("text-accent");
    }
    if (path.startsWith("/projects") && link.getAttribute("data-link") === "my-projects") {
      link.classList.add("text-accent");
    }
    if (path.startsWith("/blogs") && link.getAttribute("data-link") === "blog") {
      link.classList.add("text-accent");
    }
  });
</script>
