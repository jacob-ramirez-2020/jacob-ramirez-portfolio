<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Favicons -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32"    href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16"    href="/favicon-16x16.png">
<link rel="manifest"           href="/site.webmanifest">
<link rel="shortcut icon"      href="/favicon.ico">


<title>{{ title | default("NextGenScadaProgrammer") }}</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">

<!-- Compiled Tailwind + custom CSS -->
<link href="/css/style.css" rel="stylesheet" />

<!-- AOS Animations CSS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

<meta name="description" content="How I transitioned from a Computer Science graduate to a SCADA developer working in industrial automation, bridging the worlds of IT and OT.">
<meta name="author" content="Jacob Ramirez">
<!-- Keywords (optional, but can help) -->
{% if tags %}
<meta name="keywords" content="{{ tags | join(', ') }}" />
{% endif %}

<!-- Open Graph (for social sharing) -->
<meta property="og:title" content="{{ title | escape }}" />
<meta property="og:description" content="{{ description | escape }}" />
<meta property="og:type" content="article" />
<meta property="og:url" content="{{ page.url | url }}" />
<meta property="og:image" content="/assets/images/blog/scada-programmer.jpg" />

<!-- Twitter Card (optional) -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ title | escape }}" />
<meta name="twitter:description" content="{{ description | escape }}" />
<meta name="twitter:image" content="/assets/images/blog/scada-programmer.jpg" />
