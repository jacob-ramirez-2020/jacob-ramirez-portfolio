<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | NextGenScadaProgrammer</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#01A2D9',
            accent: '#32FF00',
            dark: '#121212',
            muted: '#1E1E1E',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-dark text-white font-sans">

<!-- Header -->
<div id="header-placeholder"></div>

<main class="pt-24 max-w-4xl mx-auto px-4 py-12">
  <h1 class="text-4xl font-bold text-primary mb-8">Blog</h1>

  <ul class="space-y-6">
    <li class="flex justify-between items-center">
      <a href="/blogs/blog-0.html" class="text-2xl text-primary hover:underline font-bold">
        Computer Science Grad to SCADA Programmer
      </a>
      <span class="text-gray-400 text-sm">Published: 2025</span>
    </li>
  </ul>

  <div class="mt-12">
    <a href="/" class="text-accent hover:underline">← Back to Home</a>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init();
</script>
<script>
  // Inject header
  fetch('/partials/header.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('header-placeholder').innerHTML = data;
    });
  
  // Inject footer
  fetch('/partials/footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
    });
  </script>

</body>
</html>
