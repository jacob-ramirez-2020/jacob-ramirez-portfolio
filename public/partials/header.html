<header class="bg-muted fixed w-full z-10 shadow">
  <nav class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
    <a href="/" class="text-primary font-bold text-xl hover:underline">NextGenScadaProgrammer</a>
    <div id="nav-links" class="space-x-6 text-sm">
      <a href="/" data-link="home" class="transition-colors duration-300 hover:text-primary">Home</a>
      <a href="/#about" data-link="about" class="transition-colors duration-300 hover:text-primary">About</a>
      <a href="/#projects" data-link="projects" class="transition-colors duration-300 hover:text-primary">Projects</a>
      <a href="/projects/modbus-mqtt-sparkplugb/" data-link="my-projects" class="transition-colors duration-300 hover:text-primary">My Projects</a>
      <a href="/blogs/" data-link="blog" class="transition-colors duration-300 hover:text-primary">Blog</a>
      <a href="/#resume" data-link="resume" class="transition-colors duration-300 hover:text-primary">Resume</a>
      <a href="/#contact" data-link="contact" class="transition-colors duration-300 hover:text-primary">Contact</a>
    </div>
  </nav>
</header>

<script>
  // Highlight the active nav link automatically
  const path = window.location.pathname;
  const navLinks = document.querySelectorAll("#nav-links a");

  navLinks.forEach(link => {
    if (path === "/" && link.getAttribute("data-link") === "home") {
      link.classList.add("text-accent");
    }
    if (path.startsWith("/projects") && link.getAttribute("data-link") === "my-projects") {
      link.classList.add("text-accent");
    }
    if (path.startsWith("/blogs") && link.getAttribute("data-link") === "blog") {
      link.classList.add("text-accent");
    }
  });
</script>
