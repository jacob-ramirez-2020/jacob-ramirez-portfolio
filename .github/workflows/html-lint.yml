name: Lint HTML

on:
  push:
    branches:
      - Production
      - Staging
      - feature/**
  pull_request:
    branches:
      - Production
      - Staging

jobs:
  html-lint:
    runs-on: ubuntu-latest
    steps:
      # 1) Fetch all history (so branches exist)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Explicitly fetch the default branch
      - name: Fetch Production branch
        run: git fetch origin Production:Production

      # 3) Run the linter
      - name: Run HTML validator
        uses: github/super-linter@v6
        env:
          VALIDATE_HTML: true
          VALIDATE_XHTML: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
