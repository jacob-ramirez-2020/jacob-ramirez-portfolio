name: Link Check

on:
  push:
    branches:
      - 'feature/**'
      - staging
      - Production
  pull_request:
    branches:
      - 'feature/**'
      - staging
      - Production

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Serve public/ with 404-on-directory
        run: |
          cat > serve_with_404.py << 'EOF'
          #!/usr/bin/env python3
          import os
          from http.server import HTTPServer, SimpleHTTPRequestHandler

          class NoDirListing(SimpleHTTPRequestHandler):
              def list_directory(self, path):
                  self.send_error(404, "Not Found")

          os.chdir('public')
          HTTPServer(('0.0.0.0', 8080), NoDirListing).serve_forever()
          EOF
          chmod +x serve_with_404.py
          python3 serve_with_404.py & sleep 2

      - name: Install Lychee CLI
        run: |
          mkdir -p $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          ARCH=$(uname -m)
          LATEST=$(curl -sL https://api.github.com/repos/lycheeverse/lychee/releases/latest \
                   | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          URL="https://github.com/lycheeverse/lychee/releases/download/${LATEST}/lychee-${ARCH}-unknown-linux-gnu.tar.gz"
          curl -sfL "$URL" | tar -xz -C $HOME/.local/bin --strip-components=1

      - name: Run Lychee over HTTP
        run: |
          lychee \
            --mode http \
            --timeout 30 \
            --verbose \
            --base http://localhost:8080/ \
            http://localhost:8080/
