name: Link Check

on:
  push:
    branches:
      - 'feature/**'
      - staging
      - Production
  pull_request:
    branches:
      - 'feature/**'
      - staging
      - Production

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Serve public/ with 404-on-directory
        run: |
          cat > serve_with_404.py << 'EOF'
          #!/usr/bin/env python3
          import os
          from http.server import HTTPServer, SimpleHTTPRequestHandler

          class NoDirListing(SimpleHTTPRequestHandler):
              def list_directory(self, path):
                  self.send_error(404, "Not Found")

          os.chdir('public')
          HTTPServer(('0.0.0.0', 8080), NoDirListing).serve_forever()
          EOF

          chmod +x serve_with_404.py
          python3 serve_with_404.py &
          sleep 2

      - name: Validate links via HTTP
        uses: lycheeverse/lychee-action@v2.4.0
        with:
          checkbox: false        # disable GitHub-checkbox output so --mode can be used
          args: >
            --mode http
            --timeout 30
            --verbose
            --base http://localhost:8080/
            http://localhost:8080/
        
