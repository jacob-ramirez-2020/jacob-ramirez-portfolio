name: Link Check

on:
  push:
    branches:
      - 'feature/**'
      - staging
      - Production
  pull_request:
    branches:
      - 'feature/**'
      - staging
      - Production

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate links in HTML
        uses: lycheeverse/lychee-action@v2.4.0
        with:
          args: >
            --base public                     # resolve “/…” to public/
            --recursive                       # crawl links within the input roots
            --verbose                         # list each file + link it checks
            './public/**/*.html'              # only check HTML under public/

