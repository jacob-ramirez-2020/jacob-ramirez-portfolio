name: Link Check

on:
  push:
    branches:
      - 'feature/**'
      - staging
      - Production
  pull_request:
    branches:
      - 'feature/**'
      - staging
      - Production

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # serve your site
      - name: Serve public/ with 404-on-directory
        run: |
          cat > serve_with_404.py << 'EOF'
          #!/usr/bin/env python3
          import os
          from http.server import HTTPServer, SimpleHTTPRequestHandler

          class NoDirListing(SimpleHTTPRequestHandler):
              def list_directory(self, path):
                  self.send_error(404, "Not Found")

          os.chdir('public')
          HTTPServer(('0.0.0.0', 8080), NoDirListing).serve_forever()
          EOF
          chmod +x serve_with_404.py
          python3 serve_with_404.py & sleep 2

      # install and immediately run Lychee CLI
      - name: Install & Run Lychee over HTTP
        run: |
          # 1) create a local bin dir and put it on PATH
          mkdir -p "$HOME/.local/bin"
          export PATH="$HOME/.local/bin:$PATH"

          # 2) download and extract the latest Lychee binary
          ARCH=$(uname -m)
          LATEST=$(curl -sL https://api.github.com/repos/lycheeverse/lychee/releases/latest \
                   | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          curl -sfL "https://github.com/lycheeverse/lychee/releases/download/${LATEST}/lychee-${ARCH}-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" --strip-components=1

          # 3) run Lychee in HTTP mode against your local server
          lychee \
            --mode http \
            --timeout 30 \
            --verbose \
            --base http://localhost:8080/ \
            http://localhost:8080/
