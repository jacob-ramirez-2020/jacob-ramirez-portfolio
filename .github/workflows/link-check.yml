name: Link Check

on:
  push:
    branches:
      - 'feature/**'
      - staging
      - Production
  pull_request:
    branches:
      - 'feature/**'
      - staging
      - Production

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate links in HTML
        uses: lycheeverse/lychee-action@v2.4.0
        with:
          args: >
            --timeout 30
            --base public
            --verbose
            --include-fragments
            public
