name: Link Check

on:
  push:
    branches:
      - 'feature/**'
      - staging
      - Production
  pull_request:
    branches:
      - 'feature/**'
      - staging
      - Production

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install local HTTP server
        run: |
          # initialize a minimal package.json so npm won't complain
          npm init -y
          # install the "serve" static‐file server locally
          npm install serve --no-save

      - name: Serve public/ on localhost:8080
        run: |
          # "-s" means single‐page fallback off (so missing paths 404)
          npx serve public -l 8080 --no-clipboard &
          sleep 2

      - name: Validate links via HTTP
        uses: lycheeverse/lychee-action@v2.4.0
        with:
          args: >
            --mode http
            --timeout 30
            --verbose
            --base http://localhost:8080/
            http://localhost:8080/
